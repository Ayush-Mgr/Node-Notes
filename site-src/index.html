<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Interactive knowledge graph of Ayush's notes — explore connections between ideas visually." />
  <title>Ayush Notes Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <nav class="main-nav">
    <a href="https://ayush-mgr.github.io/" class="back-link" aria-label="Go back to home">←</a>
    <button id="search-trigger" class="nav-search-btn" aria-label="Search notes (Ctrl+K)" type="button">
      <span class="search-text">Search</span>
      <kbd class="search-kbd">CTRL + /</kbd>
    </button>
  </nav>

  <!-- Search overlay -->
  <div id="search-backdrop" class="search-backdrop hidden" aria-hidden="true"></div>
  <div id="search-container" class="search-container hidden" role="dialog" aria-label="Search notes">
    <input id="search-input" class="search-input" type="text" placeholder="Search notes…" autocomplete="off"
      autocorrect="off" spellcheck="false" />
    <ul id="search-results" class="search-results" role="listbox"></ul>
    <div class="search-hint">Press <kbd>/</kbd> to search · <kbd>↑↓</kbd> navigate · <kbd>Enter</kbd> open ·
      <kbd>Esc</kbd> close
    </div>
  </div>

  <main class="app-shell">
    <section id="graph-view" aria-label="Notes graph"></section>
  </main>

  <div id="app-status" class="app-status" aria-live="polite" aria-atomic="true">Loading graph...</div>
  <div id="note-backdrop" class="note-backdrop hidden" aria-hidden="true"></div>
  <aside id="note-panel" class="note-panel hidden" aria-hidden="true">
    <div class="note-panel__header">
      <div class="note-panel__eyebrow">Note</div>
      <button id="close-note" class="icon-button" aria-label="Close note">Close</button>
    </div>
    <h1 id="note-title">Note</h1>
    <article id="note-content" class="note-content"></article>
  </aside>

  <div id="tooltip" class="tooltip hidden"></div>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="./app.js"></script>
</body>

</html>
