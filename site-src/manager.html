<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Manage and edit notes directly in your Node-Notes vault." />
  <meta name="theme-color" content="#fafafa" />
  <title>Vault Manager — Node Notes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://node-notes-api-zaxk.onrender.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./manager.css" />
</head>

<body>
  <div class="page">
    <header>
      <div class="header-left">
        <p class="logo">Node Notes</p>
        <h1>Vault<br /><em>Manager</em></h1>
      </div>
      <a href="https://ayush-mgr.github.io/Node-Notes/" aria-label="Go to Node Notes Home">
        <img src="img/logo.webp" alt="Logo" class="header-logo" />
      </a>
    </header>

    <main class="form" id="vault-manager">
      <section class="field section-surface" id="auth-section">
        <label>Account</label>
        <div class="auth-row">
          <div id="auth-status-loading" class="auth-status">Checking connection…</div>
          <div id="auth-status-signed-in" class="auth-status hidden">
            <div class="user-info">
              <img id="user-avatar" src="" alt="" class="user-avatar" />
              <span id="user-login" class="user-login"></span>
            </div>
            <button class="token-toggle danger" id="logout-btn" type="button">Sign Out</button>
          </div>
          <div id="auth-status-signed-out" class="auth-status hidden">
            <button class="btn-primary-small" id="login-btn" type="button">Sign in with GitHub</button>
            <p class="field-hint">Uses secure OAuth. No permanent tokens stored in browser.</p>
          </div>
        </div>
      </section>

      <section class="field section-surface" id="folder-section">
        <div class="label-row">
          <label for="note-folder">Folder Path</label>
          <button type="button" id="private-mode-toggle" class="token-toggle private-toggle" aria-label="Toggle Private Capture Mode">Private: OFF</button>
        </div>
        <div class="input-wrapper">
          <input type="text" id="note-folder" aria-controls="folder-menu" aria-expanded="false" placeholder="e.g. DataScience/Maths (optional)" autocorrect="off" spellcheck="false" />
          <div id="folder-menu" class="folder-menu hidden" role="listbox"></div>
        </div>
        <div id="folder-chips" class="chip-row"></div>
        <p id="folder-hint" class="field-hint hidden"></p>
      </section>

      <section class="field section-surface" id="editor-section">
        <div class="label-row">
          <label>Editor</label>
          <span class="draft-tag" id="draft-tag">Draft saved</span>
        </div>
 
        <div class="editor-toggle" role="tablist" aria-label="Editor mode">
          <button class="editor-tab active" id="write-tab" type="button" role="tab" aria-selected="true"
            aria-controls="write-pane">Write</button>
          <button class="editor-tab" id="preview-tab" type="button" role="tab" aria-selected="false"
            aria-controls="preview-pane">Preview</button>
        </div>
 
        <div class="editor-pane active" id="write-pane" role="tabpanel" aria-labelledby="write-tab">
          <div class="editor-wrapper">
            <div class="editor-canvas">
              <input type="text" id="note-title" class="editor-title" placeholder="Note Title" autocorrect="on" spellcheck="true" />
              <textarea id="note-body" class="editor-body" placeholder="Start writing…&#10;&#10;Markdown supported. Drag & drop or paste images." autocorrect="on"
                spellcheck="true"></textarea>
            </div>
          </div>
          <div class="attach-row">
            <button type="button" id="attach-btn" class="attach-btn" aria-label="Attach image from gallery">📎 Attach Image</button>
            <button type="button" id="camera-btn" class="attach-btn attach-btn-camera" aria-label="Capture photo">📷 Camera</button>
            <span id="attach-count" class="attach-count"></span>
          </div>
          <div id="pending-gallery" class="pending-gallery hidden"></div>
        </div>
 
        <div class="editor-pane" id="preview-pane" role="tabpanel" aria-labelledby="preview-tab" aria-hidden="true">
          <div class="editor-canvas preview-canvas">
            <h2 class="preview-title hidden" id="preview-title"></h2>
            <div class="preview-body" id="preview-body">
              <p class="preview-empty">Nothing to preview yet</p>
            </div>
          </div>
        </div>
      </section>

      <div class="status" id="status-bar" role="status" aria-live="polite">
        <span class="status-dot"></span>
        <span id="status-text"></span>
      </div>

      <section class="field section-surface vault-section" id="vault-section" aria-labelledby="vault-notes-title">
        <div class="label-row">
          <div class="vault-header-left">
            <h2 class="section-title" id="vault-notes-title">Vault Notes</h2>
            <span class="section-meta" id="note-count">Syncing</span>
          </div>
          <button type="button" id="vault-toggle" class="vault-toggle" aria-expanded="true" aria-controls="vault-body" aria-label="Toggle Vault Notes">
            <span class="chevron"></span>
          </button>
        </div>
        <div id="vault-body" class="vault-body">
          <div class="field vault-search-field">
            <input class="vault-search" type="text" id="note-search" placeholder="Search by path or filename…" />
          </div>
          <div class="vault-list" id="note-list">
            <p class="list-state">Loading vault notes…</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-actions">
        <button class="btn secondary hidden" id="cancel-edit-btn" type="button">Cancel Edit</button>
        <button class="btn-upload" id="upload-btn" type="button">Create Note</button>
      </div>
    </footer>
  </div>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script type="module" src="./manager.js"></script>

  <input type="file" id="file-picker-input" class="hidden-file-input" accept="image/*" multiple />
  <input type="file" id="camera-picker-input" class="hidden-file-input" accept="image/*" capture="environment" />
</body>

</html>
