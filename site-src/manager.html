<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Manage and edit notes directly in your Node-Notes vault." />
  <meta name="theme-color" content="#fafafa" />
  <title>Vault Manager — Node Notes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Using exactly Inter 400 & 600 as per index.html -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./manager.css" />
</head>

<body>
  <div class="page">
    <header>
      <div class="header-left">
        <p class="logo">Node Notes</p>
        <h1>Vault<br /><em>Manager</em></h1>
      </div>
      <a href="https://ayush-mgr.github.io/Node-Notes/" aria-label="Go to Node Notes Home">
        <img src="img/logo.webp" alt="Logo" class="header-logo" />
      </a>
    </header>

    <main class="form" id="vault-manager">
      <div class="field">
        <label for="token-input">GitHub Token</label>
        <div class="token-row">
          <div class="field">
            <input type="password" id="token-input" placeholder="github_pat_..." autocomplete="off" autocorrect="off"
              spellcheck="false" />
          </div>
          <button class="token-toggle" id="token-toggle" type="button"
            aria-label="Toggle token visibility">Show</button>
        </div>
        <p class="field-hint">Fine-grained PAT · Contents: Read &amp; Write · Not saved locally</p>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="note-folder">Folder Path</label>
          <button type="button" id="private-mode-toggle" class="token-toggle" style="height: 24px; font-size: 0.75rem; padding: 0 8px;" aria-label="Toggle Private Capture Mode">Private: OFF</button>
        </div>
        <input type="text" id="note-folder" list="folder-suggestions" placeholder="e.g. DataScience/Maths (optional)" autocorrect="off" spellcheck="false" />
        <datalist id="folder-suggestions"></datalist>
        <div id="folder-chips" class="chip-row"></div>
        <p id="folder-hint" class="field-hint hidden"></p>
      </div>

      <div class="field">
        <label for="note-title">Title</label>
        <input type="text" id="note-title" placeholder="Optional note title" autocorrect="on" spellcheck="true" />
      </div>

      <div class="field">
        <div class="label-row">
          <label for="note-body">Note</label>
          <span class="draft-tag" id="draft-tag">Draft saved</span>
        </div>

        <div class="editor-toggle" role="tablist" aria-label="Editor mode">
          <button class="editor-tab active" id="write-tab" type="button" role="tab" aria-selected="true"
            aria-controls="write-pane">Write</button>
          <button class="editor-tab" id="preview-tab" type="button" role="tab" aria-selected="false"
            aria-controls="preview-pane">Preview</button>
        </div>

        <div class="editor-pane active" id="write-pane" role="tabpanel" aria-labelledby="write-tab">
          <textarea id="note-body" placeholder="Start writing…&#10;&#10;Markdown supported. Drag & drop or paste images." autocorrect="on"
            spellcheck="true"></textarea>
          <div class="attach-row">
            <button type="button" id="attach-btn" class="attach-btn" aria-label="Attach image from gallery">📎 Attach Image</button>
            <button type="button" id="camera-btn" class="attach-btn attach-btn-camera" aria-label="Capture photo">📷 Camera</button>
            <span id="attach-count" class="attach-count"></span>
          </div>
        </div>

        <div class="editor-pane" id="preview-pane" role="tabpanel" aria-labelledby="preview-tab" aria-hidden="true">
          <div class="preview-pane">
            <h2 class="preview-title hidden" id="preview-title"></h2>
            <div class="preview-body" id="preview-body">
              <p class="preview-empty">Nothing to preview yet</p>
            </div>
          </div>
        </div>
      </div>

      <div class="status" id="status-bar" role="status" aria-live="polite">
        <span class="status-dot"></span>
        <span id="status-text"></span>
      </div>

          <h2 class="section-title" id="vault-notes-title">Vault Notes</h2>
          <span class="section-meta" id="note-count">Syncing</span>
        </div>
        <div class="field" style="margin-bottom: 10px;">
          <input class="vault-search" type="text" id="note-search" placeholder="Search by path or filename…" />
        </div>
        <div class="vault-list" id="note-list">
          <p class="list-state">Loading vault notes…</p>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-actions">
        <button class="btn-secondary hidden" id="cancel-edit-btn" type="button">Cancel Edit</button>
        <button class="btn-upload" id="upload-btn" type="button">Create Note</button>
      </div>
    </footer>
  </div>

  <!-- External dependencies for your js -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script type="module" src="./manager.js"></script>

  <!-- Hidden inputs for Safari-friendly file attachment -->
  <input type="file" id="file-picker-input" accept="image/*" multiple style="display:none" />
  <input type="file" id="camera-picker-input" accept="image/*" capture="environment" style="display:none" />
</body>

</html>
