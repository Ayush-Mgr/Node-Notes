<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Quick capture notes directly to your Node-Notes vault." />
  <meta name="theme-color" content="#F9F9F9" />
  <title>Inbox — Node Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens — Ink & Void ─────────────────── */
    :root {
      --bg:          #F9F9F9;
      --surface:     #FFFFFF;
      --surface-hi:  #F0F0F0;
      --ink:         #000000;
      --ink-body:    #1A1C1C;
      --ink-mid:     #4C4546;
      --ink-ghost:   rgba(0,0,0,0.12);
      --error:       #BA1A1A;
      --success:     #1A5C1A;
      --radius:      0px;
      --font-serif:  'Noto Serif', Georgia, serif;
      --font-sans:   'Inter', system-ui, sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink-body);
      font-family: var(--font-sans);
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    /* ── Layout ─────────────────────────────────────── */
    .page {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      padding: 48px 0 32px;
      border-bottom: 0.5px solid var(--ink-ghost);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: italic;
      color: var(--ink-mid);
    }

    /* ── Form ───────────────────────────────────────── */
    .form {
      flex: 1;
      padding: 40px 0 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-mid);
    }

    .field-hint {
      font-size: 0.72rem;
      color: var(--ink-mid);
      opacity: 0.7;
      margin-top: -4px;
    }

    input[type="password"],
    input[type="text"],
    textarea {
      background: var(--surface);
      border: none;
      border-bottom: 0.5px solid var(--ink-ghost);
      border-radius: var(--radius);
      color: var(--ink-body);
      font-family: var(--font-sans);
      font-size: 1rem;
      padding: 12px 0;
      width: 100%;
      outline: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
    }

    input[type="password"]:focus,
    input[type="text"]:focus,
    textarea:focus {
      border-bottom: 2px solid var(--ink);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--ink-mid);
      opacity: 0.4;
    }

    textarea {
      resize: none;
      height: clamp(200px, 38vh, 380px);
      line-height: 1.65;
      padding: 12px 0;
      font-size: 0.95rem;
    }

    /* Token section ─────────────────────────────────── */
    .token-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .token-row .field { flex: 1; }

    .token-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 12px 0;
      color: var(--ink-mid);
      font-size: 0.8rem;
      white-space: nowrap;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .token-toggle:hover { opacity: 1; }

    /* ── Status Banner ──────────────────────────────── */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      border-left: 3px solid transparent;
      background: transparent;
      transition: all 0.25s ease;
      min-height: 0;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
    }

    .status.visible {
      max-height: 80px;
      opacity: 1;
    }

    .status.uploading {
      border-color: var(--ink-ghost);
      background: var(--surface-hi);
      color: var(--ink-mid);
    }

    .status.success {
      border-color: var(--success);
      background: #f0fff0;
      color: var(--success);
    }

    .status.error {
      border-color: var(--error);
      background: #fff0f0;
      color: var(--error);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .uploading .status-dot {
      animation: pulse 1s ease-in-out infinite;
    }

    /* ── Footer / Submit ────────────────────────────── */
    footer {
      position: sticky;
      bottom: 0;
      background: rgba(249,249,249,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 20px 0 calc(20px + var(--safe-bottom));
      border-top: 0.5px solid var(--ink-ghost);
    }

    .btn-upload {
      width: 100%;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 18px 24px;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-upload:active {
      transform: scale(0.98);
    }

    .btn-upload:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Draft indicator ────────────────────────────── */
    .draft-tag {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .draft-tag.visible { opacity: 0.5; }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (min-width: 600px) {
      .page { padding: 0 40px; }
      header { padding: 64px 0 40px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <p class="logo">Node Notes</p>
      <h1>Quick<br /><em>Capture</em></h1>
    </header>

    <main class="form" id="capture-form">

      <!-- Token -->
      <div class="field">
        <label for="token-input">GitHub Token</label>
        <div class="token-row">
          <div class="field">
            <input
              type="password"
              id="token-input"
              placeholder="github_pat_..."
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
            />
          </div>
          <button class="token-toggle" id="token-toggle" type="button" aria-label="Toggle token visibility">Show</button>
        </div>
        <p class="field-hint">Fine-grained PAT · Contents: Read &amp; Write · Not saved locally</p>
      </div>

      <!-- Title -->
      <div class="field">
        <label for="note-title">Title <span style="opacity:0.45;font-weight:400;">(optional)</span></label>
        <input
          type="text"
          id="note-title"
          placeholder="Leave blank for timestamp filename"
          autocorrect="on"
          spellcheck="true"
        />
      </div>

      <!-- Content -->
      <div class="field">
        <div class="label-row">
          <label for="note-body">Note</label>
          <span class="draft-tag" id="draft-tag">Draft saved</span>
        </div>
        <textarea
          id="note-body"
          placeholder="Start writing…&#10;&#10;Markdown supported."
          autocorrect="on"
          spellcheck="true"
        ></textarea>
      </div>

      <!-- Status -->
      <div class="status" id="status-bar" role="status" aria-live="polite">
        <span class="status-dot"></span>
        <span id="status-text"></span>
      </div>

    </main>

    <footer>
      <button class="btn-upload" id="upload-btn" type="button">
        Upload to Vault
      </button>
    </footer>
  </div>

  <script>
    /* ── Config ───────────────────────────────────── */
    const OWNER  = 'Ayush-Mgr';
    const REPO   = 'Node-Notes';
    const BRANCH = 'main';
    const API    = 'https://api.github.com';

    /* ── Elements ─────────────────────────────────── */
    const tokenInput  = document.getElementById('token-input');
    const tokenToggle = document.getElementById('token-toggle');
    const titleInput  = document.getElementById('note-title');
    const bodyInput   = document.getElementById('note-body');
    const uploadBtn   = document.getElementById('upload-btn');
    const statusBar   = document.getElementById('status-bar');
    const statusText  = document.getElementById('status-text');
    const draftTag    = document.getElementById('draft-tag');

    /* ── Session token restore ────────────────────── */
    try {
      const saved = sessionStorage.getItem('nn_token');
      if (saved) tokenInput.value = saved;
    } catch (_) {}

    tokenInput.addEventListener('input', () => {
      try { sessionStorage.setItem('nn_token', tokenInput.value.trim()); } catch (_) {}
    });

    /* ── Token visibility toggle ──────────────────── */
    tokenToggle.addEventListener('click', () => {
      const hidden = tokenInput.type === 'password';
      tokenInput.type   = hidden ? 'text' : 'password';
      tokenToggle.textContent = hidden ? 'Hide' : 'Show';
    });

    /* ── Draft persistence (content only) ─────────── */
    const DRAFT_KEY = 'nn_draft_body';
    const TITLE_KEY = 'nn_draft_title';

    try {
      const savedBody  = localStorage.getItem(DRAFT_KEY);
      const savedTitle = localStorage.getItem(TITLE_KEY);
      if (savedBody)  bodyInput.value  = savedBody;
      if (savedTitle) titleInput.value = savedTitle;
      if (savedBody || savedTitle) draftTag.classList.add('visible');
    } catch (_) {}

    let draftTimer = null;
    function saveDraft() {
      clearTimeout(draftTimer);
      draftTimer = setTimeout(() => {
        try {
          localStorage.setItem(DRAFT_KEY, bodyInput.value);
          localStorage.setItem(TITLE_KEY, titleInput.value);
          draftTag.classList.toggle('visible', !!(bodyInput.value || titleInput.value));
        } catch (_) {}
      }, 600);
    }

    bodyInput.addEventListener('input', saveDraft);
    titleInput.addEventListener('input', saveDraft);

    /* ── Status helper ────────────────────────────── */
    function setStatus(type, msg) {
      statusBar.className = `status visible ${type}`;
      statusText.textContent = msg;
    }

    function clearStatus() {
      statusBar.className = 'status';
    }

    /* ── Filename generator ───────────────────────── */
    function makeFilename() {
      const now = new Date();
      const pad = (n, l = 2) => String(n).padStart(l, '0');
      return [
        now.getUTCFullYear(),
        '-', pad(now.getUTCMonth() + 1),
        '-', pad(now.getUTCDate()),
        'T', pad(now.getUTCHours()),
        '-', pad(now.getUTCMinutes()),
        '-', pad(now.getUTCSeconds()),
        '-', pad(now.getUTCMilliseconds(), 3),
        'Z.md'
      ].join('');
    }

    /* ── Frontmatter builder ──────────────────────── */
    function buildMarkdown(title, body) {
      const ts = new Date().toISOString();
      const safeTitle = (title || makeFilename().replace('.md', '')).replace(/"/g, '\\"');
      const fm = `---\ntitle: "${safeTitle}"\ndate: ${ts}\ntags: [inbox, mobile]\n---\n\n`;
      return fm + body;
    }

    /* ── UTF-8 → Base64 ───────────────────────────── */
    function toBase64(str) {
      const bytes  = new TextEncoder().encode(str);
      let   binary = '';
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary);
    }

    /* ── GitHub API helpers ───────────────────────── */
    async function getFileSha(token, path) {
      const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${path}`, {
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28',
        },
      });
      if (res.status === 404) return null;
      if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
      const data = await res.json();
      return data.sha || null;
    }

    async function putFile(token, path, content, sha, commitMsg) {
      const body = {
        message: commitMsg,
        content: toBase64(content),
        branch:  BRANCH,
        ...(sha ? { sha } : {}),
      };
      const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${path}`, {
        method:  'PUT',
        headers: {
          Authorization:          `Bearer ${token}`,
          Accept:                 'application/vnd.github+json',
          'Content-Type':         'application/json',
          'X-GitHub-Api-Version': '2022-11-28',
        },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `PUT failed: ${res.status}`);
      }
      return res.json();
    }

    /* ── Upload handler ───────────────────────────── */
    uploadBtn.addEventListener('click', async () => {
      const token = tokenInput.value.trim();
      const title = titleInput.value.trim();
      const body  = bodyInput.value.trim();

      if (!token) {
        setStatus('error', 'GitHub token required.');
        tokenInput.focus();
        return;
      }
      if (!body) {
        setStatus('error', 'Note is empty.');
        bodyInput.focus();
        return;
      }

      uploadBtn.disabled = true;
      setStatus('uploading', 'Uploading to vault…');

      try {
        const filename   = makeFilename();
        const path       = `vault/inbox/${filename}`;
        const markdown   = buildMarkdown(title, body);
        const commitMsg  = `inbox: ${title || filename}`;

        // Check for existing file (conflict prevention)
        const sha = await getFileSha(token, path);

        await putFile(token, path, markdown, sha, commitMsg);

        // Clear draft on success
        try {
          localStorage.removeItem(DRAFT_KEY);
          localStorage.removeItem(TITLE_KEY);
        } catch (_) {}
        draftTag.classList.remove('visible');

        titleInput.value = '';
        bodyInput.value  = '';

        setStatus('success', `Uploaded · ${filename} · Site rebuilding (~60s)`);
      } catch (err) {
        setStatus('error', err.message || 'Upload failed. Check token and network.');
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
